<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frank Finder 🌭</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #D4920A;          /* deli mustard yellow — ratings, nav, levels */
  --primary-dim: rgba(212,146,10,0.14);
  --accent: #B71C2A;           /* ketchup red — action buttons, CTAs, events */
  --accent-dim: rgba(183,28,42,0.12);
  --green: #2E7D32;            /* relish green — daily deals, success, fresh */
  --green-dim: rgba(46,125,50,0.13);
  --bg: #F8EDD4;
  --surface: #FFFFFF;
  --surface2: #FFF8EE;
  --surface3: #FFF3E2;
  --text: #2C1810;
  --subtext: #8B6040;
  --border: #E8D5B0;
  --star: #D4920A;             /* mustard for stars */
  --blue: #1565C0;
  --radius: 14px;
  --nav-height: 70px;
  --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF8E7 0%,#FDE8C0 55%,#F5D49A 100%) fixed;background-attachment:fixed;color:var(--text);}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:relative;background:transparent;}
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}

/* ── BOTTOM NAV ── */
#bottom-nav{
  display:flex;background:var(--surface);border-top:2px solid var(--border);
  height:var(--nav-height);flex-shrink:0;z-index:200;
  box-shadow:0 -2px 16px rgba(44,24,16,0.08);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;color:var(--subtext);cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.8px;
  text-transform:uppercase;transition:color var(--tr);padding-bottom:6px;
}
.nav-btn i{font-size:20px;transition:transform var(--tr), color var(--tr);}
.nav-btn.active{color:var(--primary);}
.nav-btn.active i{transform:translateY(-2px);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:0;transition:opacity var(--tr);margin-top:-2px;}
.nav-btn.active .nav-dot{opacity:1;}

/* ── PAGE HEADERS ── */
.page-header{
  display:flex;align-items:center;padding:14px 16px 12px;
  background:var(--surface);border-bottom:2px solid var(--border);
  flex-shrink:0;gap:10px;box-shadow:0 2px 8px rgba(44,24,16,0.07);
}
.page-title{font-size:20px;font-weight:900;flex:1;}
.page-title .accent{color:var(--primary);}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:var(--surface3);border-radius:10px;padding:3px;gap:2px;}
.toggle-btn{
  padding:5px 13px;border-radius:8px;border:none;background:none;
  color:var(--subtext);font-family:'Nunito',sans-serif;font-size:12px;
  font-weight:800;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;gap:5px;
}
.toggle-btn.active{background:var(--primary);color:#000;}
.toggle-btn i{font-size:11px;}

/* ── FILTER BUTTON ── */
.filter-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface3);color:var(--subtext);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr);flex-shrink:0;
}
.filter-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}

/* ── MAP ── */
#map-container{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

.map-marker-outer{cursor:pointer;}
.map-bubble{
  background:var(--surface);border:2px solid var(--primary);border-radius:10px;
  padding:4px 8px;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 4px 16px rgba(44,24,16,0.22);white-space:nowrap;transition:transform 0.15s;
}
.map-bubble:hover{transform:scale(1.08);}
.map-bubble .mn{font-size:11px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;}
.map-bubble .mr{font-size:11px;font-weight:700;color:var(--star);}
.map-pin-tri{
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:8px solid var(--primary);margin:0 auto;
}
.map-marker-outer.sel .map-bubble{border-color:var(--accent);background:rgba(224,48,48,0.15);}
.map-marker-outer.sel .map-pin-tri{border-top-color:var(--accent);}
.user-pin{width:16px;height:16px;background:#4285F4;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);}
.user-pulse{width:40px;height:40px;background:rgba(66,133,244,0.2);border-radius:50%;animation:pulse 2s ease-out infinite;}
@keyframes pulse{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(1.5);opacity:0;}}

.map-info-bar{
  position:absolute;top:12px;left:12px;right:12px;z-index:10;
  background:rgba(255,248,238,0.96);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(44,24,16,0.18);backdrop-filter:blur(8px);
}
.map-info-bar i{color:var(--subtext);font-size:13px;}
.map-info-bar .mib-text{color:var(--subtext);font-size:13px;font-weight:600;flex:1;}
.map-count{background:var(--primary);color:#000;font-size:11px;font-weight:900;padding:2px 9px;border-radius:20px;}

/* ── LIST VIEW ── */
#list-view{flex:1;overflow-y:auto;display:none;flex-direction:column;}
#list-view.visible{display:flex;}
.sort-bar{
  display:flex;align-items:center;gap:8px;padding:10px 12px 6px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sort-label{font-size:11px;color:var(--subtext);font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
.sort-select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  border-radius:8px;padding:5px 10px;cursor:pointer;flex:1;
}
.list-inner{padding:10px;display:flex;flex-direction:column;gap:10px;}

.restaurant-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  display:flex;cursor:pointer;border:1px solid var(--border);
  transition:all var(--tr);flex-shrink:0;
}
.restaurant-card:active{border-color:var(--primary);transform:scale(0.99);}
.card-img{
  width:100px;height:100px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:42px;
}
.card-body{flex:1;padding:12px 12px 12px 4px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.card-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.card-rating{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:700;color:var(--star);}
.card-rcount{font-size:11px;color:var(--subtext);}
.card-dist{font-size:11px;color:var(--subtext);margin-left:auto;}
.card-specialty{
  background:var(--primary-dim);border:1px solid rgba(240,165,0,0.25);color:var(--primary);
  font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px;
  align-self:flex-start;margin-top:5px;
}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.ctag{font-size:10px;font-weight:700;background:var(--surface3);color:var(--subtext);border-radius:4px;padding:2px 6px;}

/* ── FILTER PANEL ── */
#filter-overlay{position:fixed;top:0;left:0;right:0;bottom:var(--nav-height);background:rgba(44,24,16,0.45);z-index:500;opacity:0;pointer-events:none;transition:opacity var(--tr);}
#filter-overlay.open{opacity:1;pointer-events:all;}
#filter-panel{
  position:fixed;bottom:var(--nav-height);left:0;right:0;z-index:501;
  background:var(--surface);border-radius:20px 20px 0 0;
  transform:translateY(110%);transition:transform var(--tr);
  max-height:78vh;display:flex;flex-direction:column;overflow:hidden;
}
#filter-panel.open{transform:translateY(0);}
.fp-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:16px auto 0;flex-shrink:0;}
.fp-title{font-size:18px;font-weight:900;padding:14px 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.fp-scroll{flex:1;overflow-y:auto;padding:0 20px 8px;}
.fp-footer{padding:10px 20px 22px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.fp-clear{font-size:13px;font-weight:800;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;}
.fp-section{margin-bottom:22px;}
.fp-section-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--subtext);margin-bottom:10px;}
.radius-row{display:flex;align-items:center;gap:10px;}
.radius-slider{flex:1;accent-color:var(--primary);cursor:pointer;height:4px;}
.radius-val{font-size:14px;font-weight:900;color:var(--primary);min-width:40px;text-align:right;}
.rating-chips{display:flex;gap:8px;flex-wrap:wrap;}
.rchip{
  padding:6px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--subtext);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all var(--tr);
}
.rchip.active{background:var(--primary);border-color:var(--primary);color:#000;}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cb-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;}
.cb-item input{accent-color:var(--primary);width:16px;height:16px;cursor:pointer;}
.cb-item label{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.fp-apply{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;
  cursor:pointer;margin-top:4px;
}

/* ── RESTAURANT DETAIL ── */
#detail-overlay{
  position:fixed;inset:0;z-index:600;
  background:linear-gradient(180deg,#FFF8E7 0%,#FDF0D9 100%);
  transform:translateX(100%);transition:transform var(--tr);
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-overlay.open{transform:translateX(0);}
.d-back{
  position:absolute;top:14px;left:14px;z-index:10;width:38px;height:38px;
  border-radius:50%;background:rgba(44,24,16,0.65);display:flex;align-items:center;
  justify-content:center;border:none;color:#fff;font-size:16px;cursor:pointer;
  backdrop-filter:blur(8px);
}
.d-img-wrap{height:230px;flex-shrink:0;position:relative;overflow:hidden;background:var(--surface2);}
.d-img-wrap img{width:100%;height:100%;object-fit:cover;}
.d-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px;}
.d-img-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.d-img-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:background 0.2s;}
.d-img-dot.active{background:#fff;}
.d-scroll{flex:1;overflow-y:auto;padding:20px;}
.d-name{font-size:24px;font-weight:900;margin-bottom:8px;}
.d-rating-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;cursor:pointer;width:fit-content;border-radius:8px;transition:opacity 0.15s;}
.d-rating-row:hover{opacity:0.75;}
.d-stars{color:var(--star);font-size:16px;font-weight:900;}
.d-rcount{color:var(--subtext);font-size:13px;text-decoration:underline;text-underline-offset:2px;}
.d-badges{display:flex;gap:6px;flex-wrap:wrap;}
.dbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;border:1px solid;}
.dbadge-style{background:var(--primary-dim);border-color:rgba(240,165,0,0.3);color:var(--primary);}
.dbadge-brand{background:rgba(100,180,255,0.1);border-color:rgba(100,180,255,0.3);color:var(--blue);}
.d-section{margin-top:22px;}
.d-section-title{font-size:16px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.d-section-title i{color:var(--primary);}
.d-desc{font-size:14px;line-height:1.75;color:var(--subtext);}
.d-divider{height:1px;background:var(--border);margin:22px 0;}
.d-address{
  display:flex;align-items:center;gap:8px;margin-top:16px;margin-bottom:4px;
  font-size:13px;font-weight:700;color:var(--blue);text-decoration:none;
  background:rgba(21,101,192,0.07);border:1px solid rgba(21,101,192,0.18);
  border-radius:10px;padding:9px 13px;width:fit-content;
  transition:background 0.2s;
}
.d-address:hover{background:rgba(21,101,192,0.13);}
.d-address i{font-size:14px;color:var(--blue);flex-shrink:0;}

/* Menu items */
.menu-item{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.mi-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px;}
.mi-name{font-size:14px;font-weight:800;flex:1;}
.mi-price{font-size:14px;font-weight:700;color:var(--primary);white-space:nowrap;}
.mi-rating{font-size:12px;color:var(--star);margin-bottom:4px;}
.mi-desc{font-size:12px;color:var(--subtext);line-height:1.5;}

/* Reviews */
.review-item{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.rv-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;flex-shrink:0;}
.rv-meta{flex:1;}
.rv-user{font-size:14px;font-weight:800;}
.rv-date{font-size:11px;color:var(--subtext);}
.rv-stars{color:var(--star);font-size:12px;margin-bottom:4px;}
.rv-text{font-size:13px;color:var(--subtext);line-height:1.6;}

/* Review form */
.review-form{background:var(--surface2);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border);}
.rf-title{font-size:15px;font-weight:900;margin-bottom:12px;}
.rv-signin-prompt{text-align:center;padding:8px 0 4px;}
.rv-signin-prompt p{font-size:13px;color:var(--subtext);margin-bottom:14px;line-height:1.5;}
.rv-signin-prompt .google-btn{max-width:280px;margin:0 auto;font-size:14px;padding:11px 16px;}
.star-input{display:flex;gap:8px;margin-bottom:12px;}
.si-star{font-size:30px;cursor:pointer;color:var(--border);transition:color 0.15s,transform 0.15s;user-select:none;}
.si-star.lit{color:var(--star);}
.si-star:hover{color:var(--star);transform:scale(1.15);}
.rv-textarea{
  width:100%;background:var(--surface3);border:1px solid var(--border);
  border-radius:10px;padding:12px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:14px;resize:none;height:88px;margin-bottom:12px;outline:none;line-height:1.5;
}
.rv-textarea::placeholder{color:var(--subtext);}
.rv-textarea:focus{border-color:var(--primary);}
.rv-submit{
  width:100%;padding:12px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;
}
.no-reviews{text-align:center;color:var(--subtext);font-size:14px;padding:20px 0;}

/* ── SPECIALS PAGE ── */
#specials-page{overflow:hidden;}
.specials-tab-bar{
  display:flex;gap:10px;padding:12px 12px 0;flex-shrink:0;background:transparent;
}
.spec-tab{
  flex:1;padding:13px 8px;border:1px solid var(--border);background:var(--surface);
  border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:var(--subtext);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;
  justify-content:center;gap:6px;letter-spacing:0.2px;
  box-shadow:0 2px 6px rgba(44,24,16,0.07);
}
.spec-tab:hover{border-color:var(--subtext);color:var(--text);}
#spec-tab-daily.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
#spec-tab-event.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
#spec-tab-holiday.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.spec-tab-pill{
  font-size:10px;font-weight:900;padding:1px 6px;border-radius:20px;
  background:var(--surface3);color:var(--subtext);transition:all var(--tr);
}
#spec-tab-daily.active .spec-tab-pill{background:rgba(46,125,50,0.2);color:var(--green);}
#spec-tab-event.active .spec-tab-pill{background:rgba(183,28,42,0.2);color:var(--accent);}
#spec-tab-holiday.active .spec-tab-pill{background:rgba(212,146,10,0.2);color:var(--primary);}
.specials-content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
.specials-section-hdr{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:var(--subtext);padding:8px 4px 4px;}
.special-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:all var(--tr);
}
.special-card:active{border-color:var(--accent);transform:scale(0.99);}
.sc-header{padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.sc-emoji{font-size:36px;flex-shrink:0;line-height:1;}
.sc-info{flex:1;}
.sc-restaurant{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.sc-title{font-size:16px;font-weight:900;margin-bottom:4px;}
.sc-desc{font-size:13px;color:var(--subtext);line-height:1.5;}
.sc-footer{padding:9px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.sc-type{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;}
.sct-daily{background:var(--green-dim);color:var(--green);}
.sct-event{background:var(--accent-dim);color:var(--accent);}
.sct-holiday{background:var(--primary-dim);color:var(--primary);}
.sc-expires{font-size:11px;color:var(--subtext);}

/* ── PROFILE PAGE ── */
#profile-page{overflow-y:auto;}
.profile-content{padding-bottom:28px;}
.profile-hero{
  background:linear-gradient(160deg,var(--surface2) 0%,var(--surface) 100%);
  padding:24px 20px 20px;border-bottom:1px solid var(--border);
}
.ph-top{display:flex;gap:18px;align-items:center;margin-bottom:18px;}
.ph-avatar-wrap{position:relative;flex-shrink:0;}
.ph-avatar{
  width:78px;height:78px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:30px;font-weight:900;color:#000;
  border:3px solid var(--primary);overflow:hidden;cursor:pointer;
}
.ph-avatar img{width:100%;height:100%;object-fit:cover;}
.ph-avatar-edit{
  position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--primary);
  border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:2px solid var(--bg);
}
.ph-avatar-edit i{font-size:10px;color:#000;}
.ph-info{flex:1;}
.ph-nickname{font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;}
.ph-edit-nick{background:none;border:none;color:var(--subtext);font-size:14px;cursor:pointer;padding:2px 4px;}
.ph-level-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-dim);border:1px solid rgba(240,165,0,0.35);
  border-radius:20px;padding:4px 12px;margin-top:6px;
}
.plb-emoji{font-size:15px;}
.plb-name{font-size:12px;font-weight:800;color:var(--primary);}
.ph-stats{display:flex;gap:0;}
.ph-stat{flex:1;text-align:center;padding:12px 0;border-right:1px solid var(--border);}
.ph-stat:last-child{border-right:none;}
.ps-val{font-size:20px;font-weight:900;color:var(--primary);}
.ps-label{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--subtext);letter-spacing:0.5px;margin-top:2px;}

.ac-body{padding:16px 16px 0;}
.level-progress-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:16px;border:1px solid var(--border);}

.lpc-next{font-size:12px;color:var(--subtext);}
.prog-bar{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 0.7s ease;}
.lpc-desc{font-size:12px;color:var(--subtext);}

.ac-section{margin-bottom:20px;}
.ac-section-title{font-size:18px;font-weight:900;margin-bottom:12px;}
.my-rev-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.mrc-restaurant{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.mrc-stars{color:var(--star);font-size:13px;margin-bottom:5px;}
.mrc-text{font-size:13px;color:var(--subtext);line-height:1.5;}
.mrc-date{font-size:10px;color:var(--border);margin-top:6px;}
.empty-revs{text-align:center;color:var(--subtext);padding:32px 0;}
.empty-revs i{font-size:42px;color:var(--border);display:block;margin-bottom:12px;}
.empty-revs p{font-size:14px;font-weight:600;}

/* Nickname modal */
#nick-modal{position:fixed;inset:0;z-index:700;display:none;align-items:flex-end;}
#nick-modal.open{display:flex;}
.nm-backdrop{position:absolute;inset:0;background:rgba(44,24,16,0.45);}
.nm-panel{
  position:relative;width:100%;background:var(--surface);
  border-radius:20px 20px 0 0;padding:24px 20px 36px;z-index:1;
}
.nm-title{font-size:18px;font-weight:900;margin-bottom:14px;}
.nm-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:16px;outline:none;margin-bottom:14px;
}
.nm-input:focus{border-color:var(--primary);}
.nm-save{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;}

/* Loading screen */
/* ── SHARED GOOGLE BUTTON ── */
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;border-radius:12px;cursor:pointer;
  background:#fff;border:1.5px solid #dadce0;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#3c4043;
  transition:box-shadow 0.2s,background 0.2s;
}
.google-btn:hover{background:#f8f9fa;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.google-btn svg{flex-shrink:0;}
.login-privacy{font-size:11px;color:var(--subtext);margin-top:18px;line-height:1.5;opacity:0.8;}
.ph-email{font-size:11px;color:var(--subtext);margin-top:2px;opacity:0.8;}

/* ── PROFILE SIGN-IN CARD ── */
.profile-signin-card{
  margin:32px 20px;background:var(--surface);border-radius:20px;
  padding:40px 24px 32px;text-align:center;
  border:1px solid var(--border);box-shadow:0 4px 24px rgba(44,24,16,0.08);
}
.psc-logo{font-size:52px;margin-bottom:12px;}
.psc-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:8px;}
.psc-sub{font-size:13px;color:var(--subtext);margin-bottom:20px;line-height:1.6;}
.psc-benefits{list-style:none;text-align:left;margin-bottom:24px;display:flex;flex-direction:column;gap:10px;}
.psc-benefits li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text);font-weight:700;line-height:1.4;}
.psc-benefits li span.psc-icon{font-size:18px;flex-shrink:0;margin-top:-1px;}
.psc-benefits li span.psc-desc{color:var(--subtext);font-weight:600;}

/* ── SIGN-OUT BUTTON ── */
.signout-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface3);color:var(--subtext);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr);
  flex-shrink:0;margin-left:auto;
}
.signout-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

#loading-screen{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(160deg,#FFF8E7 0%,#FDE8C0 55%,#F5D49A 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity 0.5s ease;
}
#loading-screen.hide{opacity:0;pointer-events:none;}
.ls-logo{font-size:72px;animation:hotdog-bounce 0.9s ease-in-out infinite alternate;}
@keyframes hotdog-bounce{from{transform:rotate(-8deg) translateY(0);}to{transform:rotate(8deg) translateY(-14px);}}
.ls-title{font-size:30px;font-weight:900;letter-spacing:-0.5px;color:var(--text);}
.ls-title .ac{color:var(--accent);}
.ls-sub{color:var(--subtext);}
.ls-sub{font-size:14px;color:var(--subtext);}
.ls-dots{display:flex;gap:8px;}
.ls-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:ldot 1.2s ease-in-out infinite;}
.ls-dot:nth-child(2){animation-delay:0.2s;}
.ls-dot:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{transform:scale(0.7);opacity:0.4;}40%{transform:scale(1.1);opacity:1;}}

/* Toast */
#toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface);border:1px solid var(--border);border-radius:30px;
  padding:10px 20px;font-size:14px;font-weight:700;z-index:900;
  transition:transform 0.3s ease;box-shadow:0 4px 20px rgba(44,24,16,0.2);
  white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast i{margin-right:7px;color:var(--primary);}

.leaflet-bar{box-shadow:0 2px 12px rgba(44,24,16,0.15)!important;}
.leaflet-control-container{z-index:400!important;}
.leaflet-control-attribution{

}
.leaflet-popup-content-wrapper{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Utility */
.flex-center{display:flex;align-items:center;justify-content:center;}
.hidden{display:none!important;}

//  UTILITY FUNCTIONS
// ═══════════════════════════════════════════

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderStars(rating, size=13) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return `<span style="color:var(--star);font-size:${size}px;font-weight:700;">${s}</span> <span style="font-size:${size}px;font-weight:700;">${rating.toFixed(1)}</span>`;
}

function starsEmoji(rating) {
  const n = Math.round(rating);
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function getRestaurantById(id) {
  return RESTAURANTS.find(r => r.id === id);
}

function showToast(msg, icon='star') {
  const t = document.getElementById('toast');
  t.innerHTML = `<i class="fa-solid fa-${icon}"></i>${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function getLevelInfo(reviewCount) {
  for (const l of [...LEVELS].reverse()) {
    if (reviewCount >= l.min) return l;
  }
  return LEVELS[0];
}

function getLevelProgress(reviewCount) {
  const levels = LEVELS.filter(l => l.max !== Infinity);
  for (let i = 0; i < levels.length; i++) {
    const l = levels[i];
    if (reviewCount >= l.min && reviewCount <= l.max) {
      const range = l.max - l.min + 1;
      const progress = reviewCount - l.min;
      return { pct: (progress / range) * 100, current: reviewCount, needed: l.max + 1, levelMax: l.max };
    }
  }
  return { pct: 100, current: reviewCount, needed: null, levelMax: null };
}

function getFilteredRestaurants() {
  const { radius, minRating, styles, brands } = state.filters;
  const { lat, lng } = state.userLocation;
  return RESTAURANTS.filter(r => {
    const dist = haversine(lat, lng, r.lat, r.lng);
    if (dist > radius) return false;
    if (r.rating < minRating) return false;
    if (styles.length > 0 && !styles.some(s => r.styles.includes(s))) return false;
    if (brands.length > 0 && !brands.some(b => r.brands.includes(b))) return false;
    return true;
  }).map(r => ({ ...r, distance: haversine(lat, lng, r.lat, r.lng) }));
}

function navTo(page) {
  state.page = page;
  ['locator','specials','profile'].forEach(p => {
    document.getElementById(`${p}-page`).classList.toggle('active', p === page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });
  if (page === 'locator' && state.map) {
    setTimeout(() => state.map.invalidateSize(), 100);
  }
  if (page === 'specials') renderSpecials();
  if (page === 'profile') renderProfile();
}

function initMap() {
  if (state.mapInited) return;
  state.mapInited = true;

  const map = L.map('map', {
    center: [state.userLocation.lat, state.userLocation.lng],
    zoom: 13,
    zoomControl: true,
    attributionControl: false,
  });
  L.control.attribution({ position: 'topright', prefix: false }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  state.map = map;

  // User location pulse marker
  const userIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
      <div class="user-pulse" style="position:absolute;"></div>
      <div class="user-pin"></div>
    </div>`,
    iconSize: [40, 40],
    iconAnchor: [20, 20],
  });
  state.userMarker = L.marker([state.userLocation.lat, state.userLocation.lng], { icon: userIcon })
    .addTo(map)
    .bindPopup('<b>You are here</b>');

  renderMapMarkers();

  // Try geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      state.map.setView([state.userLocation.lat, state.userLocation.lng], 13);
      state.userMarker.setLatLng([state.userLocation.lat, state.userLocation.lng]);
      document.getElementById('map-location-text').textContent = 'Near your location';
      renderMapMarkers();
      renderList();
    }, () => {
      document.getElementById('map-location-text').textContent = 'New Jersey (demo)';
    });
  } else {
    document.getElementById('map-location-text').textContent = 'New Jersey (demo)';
  }
}

function renderMapMarkers() {
  state.markers.forEach(m => m.remove());
  state.markers = [];

  const filtered = getFilteredRestaurants();
  document.getElementById('map-count').textContent = filtered.length;

  filtered.forEach(r => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-marker-outer" id="mm-${r.id}">
        <div class="map-bubble">
          <span class="mn">${r.name}</span>
          <span class="mr">★${r.rating}</span>
        </div>
        <div class="map-pin-tri"></div>
      </div>`,
      iconSize: [140, 44],
      iconAnchor: [70, 44],
      popupAnchor: [0, -44],
    });

    const marker = L.marker([r.lat, r.lng], { icon })
      .addTo(state.map)
      .on('click', () => openDetail(r.id));

    state.markers.push(marker);
  });

  if (state.map && filtered.length > 0) {
    const group = L.featureGroup(state.markers);
    state.map.fitBounds(group.getBounds().pad(0.15), { maxZoom: 14 });
  }
}

function setView(view) {
  state.locatorView = view;
  document.getElementById('map-toggle').classList.toggle('active', view === 'map');
  document.getElementById('list-toggle').classList.toggle('active', view === 'list');
  document.getElementById('map-container').style.display = view === 'map' ? '' : 'none';
  const listEl = document.getElementById('list-view');
  if (view === 'list') {
    listEl.classList.add('visible');
    renderList();
  } else {
    listEl.classList.remove('visible');
    if (state.map) setTimeout(() => state.map.invalidateSize(), 100);
  }
}

function renderList() {
  const sortBy = document.getElementById('sort-select').value;
  let restaurants = getFilteredRestaurants();

  restaurants.sort((a, b) => {
    if (sortBy === 'distance') return a.distance - b.distance;
    if (sortBy === 'rating') return b.rating - a.rating;
    if (sortBy === 'reviews') return b.reviewCount - a.reviewCount;
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    return 0;
  });

  const container = document.getElementById('list-inner');
  if (restaurants.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--subtext);">
      <div style="font-size:48px;margin-bottom:12px;">🌭</div>
      <div style="font-size:16px;font-weight:700;">No spots found</div>
      <div style="font-size:13px;margin-top:6px;">Try adjusting your filters</div>
    </div>`;
    return;
  }

  container.innerHTML = restaurants.map(r => `
    <div class="restaurant-card" onclick="openDetail(${r.id})">
      <div class="card-img" style="background:${r.bg};">${r.emoji}</div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">
          <div class="card-rating">★ ${r.rating.toFixed(1)}</div>
          <div class="card-rcount">(${r.reviewCount.toLocaleString()})</div>
          <div class="card-dist">${r.distance.toFixed(1)} mi</div>
        </div>
        <div class="card-specialty">🏆 ${r.topSpecialty}</div>
        <div class="card-tags">
          ${r.styles.slice(0,2).map(s => `<span class="ctag">${s}</span>`).join('')}
          ${r.brands.slice(0,1).map(b => `<span class="ctag">${b}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

  document.querySelectorAll('.si-star').forEach(s => {
    s.classList.toggle('lit', parseInt(s.dataset.val) <= val);
  });
}

async function submitReview(restaurantId) {
  const text = document.getElementById('rv-textarea').value.trim();
  if (!state.reviewStarInput) { showToast('Please select a star rating', 'triangle-exclamation'); return; }
  if (text.length < 10) { showToast('Write at least 10 characters', 'triangle-exclamation'); return; }

  const review = {
    restaurantId,
    rating:       state.reviewStarInput,
    text,
    date:         new Date().toISOString().split('T')[0],
    userId:       currentUser ? currentUser.uid : 'guest',
    userNickname: state.user.nickname,
    createdAt:    firebase.firestore.FieldValue.serverTimestamp()
  };

  // Write to Firestore
  if (currentUser) {
    try {
      await db.collection('reviews').add(review);
      await db.collection('users').doc(currentUser.uid).update({
        visitCount: firebase.firestore.FieldValue.increment(1)
      });
    } catch(e) { console.warn('Firestore review write failed:', e); }
  }

  // Update local state
  state.user.reviews.unshift(review);
  state.user.visitCount++;
  const r = RESTAURANTS.find(x => x.id === restaurantId);
  if (r) r.reviewCount++;

  showToast('Review submitted! Thanks, ' + state.user.nickname + '!', 'check');
  openDetail(restaurantId); // Refresh detail view
}

async function signInWithGoogle() {

  } catch(e) {

      showToast('Sign-in failed. Please try again.', 'triangle-exclamation');
      console.error('Google sign-in error:', e);

  }

async function loadOrCreateProfile(user) {
  const ref = db.collection('users').doc(user.uid);
  const snap = await ref.get();

  if (snap.exists) {
    userProfile = snap.data();
    // Sync state from Firestore
    state.user.nickname  = userProfile.nickname  || user.displayName || 'FrankFan';
    state.user.photoUrl  = user.photoURL          || null;
    state.user.visitCount = userProfile.visitCount || 0;

    // Load this user's reviews from Firestore
    const rvSnap = await db.collection('reviews')
      .where('userId', '==', user.uid)
      .orderBy('createdAt', 'desc')
      .get();
    state.user.reviews = rvSnap.docs.map(d => d.data());
  } else {
    // New user — create their profile doc
    const defaultNick = (user.displayName || 'FrankFan').replace(/\s+/g, '');
    userProfile = {
      nickname:   defaultNick,
      photoUrl:   user.photoURL || null,
      visitCount: 0,
      createdAt:  firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(userProfile);
    state.user.nickname  = defaultNick;
    state.user.photoUrl  = user.photoURL || null;
    state.user.visitCount = 0;
    state.user.reviews   = [];
  }
}

function handleAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    state.user.photoUrl = evt.target.result;
    renderProfile();
    showToast('Profile photo updated!', 'check');
  };
  reader.readAsDataURL(file);
}

    // Hide loading screen and show app — everyone gets in
    document.getElementById('loading-screen').classList.add('hide');
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
    document.getElementById('app').style.display = 'flex';
    initMap();
  }

  // Minimum splash duration (1.4 s)
  setTimeout(() => { splashDone = true; maybeReveal(); }, 1400);

  // Start app hidden during splash
  document.getElementById('app').style.display = 'none';

  // Process any pending redirect FIRST, then wire up the auth listener.
  function setupAuthListener() {
    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        try { await loadOrCreateProfile(user); } catch(e) { console.warn('Profile load error:', e); }
      } else {
        currentUser = null;
        userProfile = null;
        state.user = { nickname:'FrankFan', photoUrl:null, reviews:[], visitCount:0 };
      }
      // Re-render profile page if it's currently visible
      if (state.page === 'profile') renderProfile();
      authReady = true;
      maybeReveal();
    });
  }

  // Wait for redirect result before listening to auth state
  auth.getRedirectResult()
    .catch(err => {
      if (err.code && !['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(err.code)) {
        showToast('Sign-in failed. Please try again.', 'triangle-exclamation');
      }
    })
    .finally(() => {
      setupAuthListener();
    });
});
</script>
</body>
</html>
