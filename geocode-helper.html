<!DOCTYPE html>

<title>Frank Finder — Geocoder</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
  h2 { color: #D4920A; }
  button { background: #D4920A; color: #000; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-bottom: 20px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status { margin: 10px 0; color: #aaa; min-height: 24px; }
  #progress { width: 100%; background: #333; border-radius: 4px; height: 8px; margin-bottom: 16px; }
  #bar { height: 8px; background: #D4920A; border-radius: 4px; width: 0%; transition: width 0.3s; }
  #output { background: #0d0d0d; border: 1px solid #333; border-radius: 8px; padding: 16px; white-space: pre; overflow-x: auto; font-size: 12px; line-height: 1.6; max-height: 60vh; overflow-y: auto; }
  .ok  { color: #2ECC71; }
  .err { color: #E74C3C; }
  .copy-btn { background: #444; color: #fff; border: none; padding: 8px 16px; cursor: pointer; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
  .copy-btn:hover { background: #666; }
  p { color: #aaa; line-height: 1.6; }
</style>
</head>
<body>
<h2>🌭 Frank Finder — Address Geocoder</h2>
<p>Click the button below. This page will geocode all 40 restaurant addresses via OpenStreetMap Nominatim<br>
and produce corrected lat/lng values. Copy the output and send it to Claude to update the app.</p>
<button id="runBtn" onclick="runGeocoder()">▶ Geocode All Addresses</button>
<div id="progress"><div id="bar"></div></div>
<div id="status">Ready.</div>
<button class="copy-btn" onclick="copyOutput()" style="display:none" id="copyBtn">📋 Copy Output</button>
<div id="output">Results will appear here...</div>

async function geocode(address) {
  const q = encodeURIComponent(address + ', USA');
  const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`;
  const res = await fetch(url, { headers: { 'User-Agent': 'FrankFinder Geocoder' } });
  const json = await res.json();
  if (json.length > 0) return { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runGeocoder() {
  const btn = document.getElementById('runBtn');
  const out = document.getElementById('output');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');
  btn.disabled = true;
  out.innerHTML = '';

  const results = [];
  for (let i = 0; i < RESTAURANTS.length; i++) {
    const r = RESTAURANTS[i];
    status.textContent = `Geocoding ${i+1}/${RESTAURANTS.length}: ${r.name}...`;
    bar.style.width = `${Math.round((i / RESTAURANTS.length) * 100)}%`;

    await sleep(1100); // Nominatim rate limit: 1 req/sec
    let coords = null;
    try { coords = await geocode(r.address); } catch(e) {}

    if (coords) {
      results.push({ id: r.id, lat: coords.lat, lng: coords.lng });
      out.innerHTML += `<span class="ok">✓ id:${r.id} ${r.name}\n   lat:${coords.lat}, lng:${coords.lng}\n</span>`;
    } else {
      results.push({ id: r.id, lat: null, lng: null });
      out.innerHTML += `<span class="err">✗ id:${r.id} ${r.name} — no result\n</span>`;
    }
    out.scrollTop = out.scrollHeight;
  }

  bar.style.width = '100%';
  status.textContent = '✅ Done! Copy the output below and paste it into Claude.';

  // Build the final output block
  out.innerHTML += '\n\n=== PASTE THIS TO CLAUDE ===\n';
  const lines = results.map(r =>
    r.lat != null
      ? `id:${r.id} lat:${r.lat} lng:${r.lng}`
      : `id:${r.id} FAILED`
  ).join('\n');
  out.innerHTML += lines;

  document.getElementById('copyBtn').style.display = 'inline-block';
  btn.disabled = false;
}

function copyOutput() {
  const text = document.getElementById('output').innerText;
  const block = text.split('=== PASTE THIS TO CLAUDE ===\n')[1] || text;
  navigator.clipboard.writeText(block.trim()).then(() => {
    document.getElementById('copyBtn').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = '📋 Copy Output', 2000);
  });
}
</script>
</body>
</html>
