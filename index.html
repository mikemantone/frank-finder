<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frank Finder 🌭</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #D4920A;          /* deli mustard yellow — ratings, nav, levels */
  --primary-dim: rgba(212,146,10,0.14);
  --accent: #B71C2A;           /* ketchup red — action buttons, CTAs, events */
  --accent-dim: rgba(183,28,42,0.12);
  --green: #2E7D32;            /* relish green — daily deals, success, fresh */
  --green-dim: rgba(46,125,50,0.13);
  --bg: #F8EDD4;
  --surface: #FFFFFF;
  --surface2: #FFF8EE;
  --surface3: #FFF3E2;
  --text: #2C1810;
  --subtext: #8B6040;
  --border: #E8D5B0;
  --star: #D4920A;             /* mustard for stars */
  --blue: #1565C0;
  --radius: 14px;
  --nav-height: 70px;
  --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFF8E7 0%,#FDE8C0 55%,#F5D49A 100%) fixed;background-attachment:fixed;color:var(--text);}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:relative;background:transparent;}
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}

/* ── BOTTOM NAV ── */
#bottom-nav{
  display:flex;background:var(--surface);border-top:2px solid var(--border);
  height:var(--nav-height);flex-shrink:0;z-index:200;
  box-shadow:0 -2px 16px rgba(44,24,16,0.08);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;background:none;border:none;color:var(--subtext);cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.8px;
  text-transform:uppercase;transition:color var(--tr);padding-bottom:6px;
}
.nav-btn i{font-size:20px;transition:transform var(--tr), color var(--tr);}
.nav-btn.active{color:var(--primary);}
.nav-btn.active i{transform:translateY(-2px);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:0;transition:opacity var(--tr);margin-top:-2px;}
.nav-btn.active .nav-dot{opacity:1;}

/* ── PAGE HEADERS ── */
.page-header{
  display:flex;align-items:center;padding:0 16px;
  background:var(--surface);border-bottom:2px solid var(--border);
  flex-shrink:0;gap:10px;box-shadow:0 2px 8px rgba(44,24,16,0.07);
  height:58px;box-sizing:border-box;
}
.page-title{font-size:20px;font-weight:900;flex:1;}
.page-title .accent{color:var(--primary);}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;background:var(--surface3);border-radius:10px;padding:3px;gap:2px;}
.toggle-btn{
  padding:5px 13px;border-radius:8px;border:none;background:none;
  color:var(--subtext);font-family:'Nunito',sans-serif;font-size:12px;
  font-weight:800;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;gap:5px;
}
.toggle-btn.active{background:var(--primary);color:#000;}
.toggle-btn i{font-size:11px;}

/* ── FILTER BUTTON ── */
.filter-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface3);color:var(--subtext);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr);flex-shrink:0;
}
.filter-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}

/* ── MAP ── */
#map-container{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

.map-marker-outer{cursor:pointer;}
.map-bubble{
  background:var(--surface);border:2px solid var(--primary);border-radius:10px;
  padding:4px 8px;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 4px 16px rgba(44,24,16,0.22);white-space:nowrap;transition:transform 0.15s;
}
.map-bubble:hover{transform:scale(1.08);}
.map-bubble .mn{font-size:11px;font-weight:800;color:var(--text);max-width:80px;overflow:hidden;text-overflow:ellipsis;}
.map-bubble .mr{font-size:11px;font-weight:700;color:var(--star);}
/* Compact pin (zoomed out) */
.map-bubble.compact{border-radius:20px;padding:3px 7px;gap:3px;}
.map-bubble.compact .me{font-size:13px;line-height:1;}
.map-bubble.compact .mr{font-size:10px;}
.map-pin-tri{
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:8px solid var(--primary);margin:0 auto;
}
.map-marker-outer.sel .map-bubble{border-color:var(--accent);background:rgba(224,48,48,0.15);}
.map-marker-outer.sel .map-pin-tri{border-top-color:var(--accent);}
.user-pin{width:16px;height:16px;background:#4285F4;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);}
.user-pulse{width:40px;height:40px;background:rgba(66,133,244,0.2);border-radius:50%;animation:pulse 2s ease-out infinite;}
@keyframes pulse{0%{transform:scale(0.5);opacity:1;}100%{transform:scale(1.5);opacity:0;}}

.map-info-bar{
  position:absolute;top:12px;left:12px;right:12px;z-index:10;
  background:rgba(255,248,238,0.96);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(44,24,16,0.18);backdrop-filter:blur(8px);
}
.map-info-bar i{color:var(--subtext);font-size:13px;}
.map-info-bar .mib-text{color:var(--subtext);font-size:13px;font-weight:600;flex:1;}
.map-count{background:var(--primary);color:#000;font-size:11px;font-weight:900;padding:2px 9px;border-radius:20px;}

/* ── LIST VIEW ── */
#list-view{flex:1;overflow:hidden;display:none;flex-direction:column;}
#list-view.visible{display:flex;}
.sort-bar{
  display:flex;align-items:center;gap:8px;padding:12px 12px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);
}
.sort-label{font-size:11px;color:var(--subtext);font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
.sort-select{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  border-radius:8px;padding:5px 10px;cursor:pointer;flex:1;
}
.list-inner{padding:10px;display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;}

.restaurant-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  display:flex;cursor:pointer;border:1px solid var(--border);
  transition:all var(--tr);flex-shrink:0;
}
.restaurant-card:active{border-color:var(--primary);transform:scale(0.99);}
.card-img{
  width:100px;min-height:100px;flex-shrink:0;align-self:stretch;display:flex;align-items:center;
  justify-content:center;font-size:42px;
}
.card-body{flex:1;padding:12px 12px 12px 12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.card-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.card-rating{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:700;color:var(--star);}
.card-rcount{font-size:11px;color:var(--subtext);}
.card-dist{font-size:11px;color:var(--subtext);margin-left:auto;}
.card-specialty{
  background:var(--primary-dim);border:1px solid rgba(240,165,0,0.25);color:var(--primary);
  font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px;
  align-self:flex-start;margin-top:5px;
}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.ctag{font-size:10px;font-weight:700;background:var(--surface3);color:var(--subtext);border-radius:4px;padding:2px 6px;}

/* ── FILTER PANEL ── */
#filter-overlay{position:fixed;top:0;left:0;right:0;bottom:var(--nav-height);background:rgba(44,24,16,0.45);z-index:500;opacity:0;pointer-events:none;transition:opacity var(--tr);}
#filter-overlay.open{opacity:1;pointer-events:all;}
#filter-panel{
  position:fixed;bottom:var(--nav-height);left:0;right:0;z-index:501;
  background:var(--surface);border-radius:20px 20px 0 0;
  transform:translateY(110%);transition:transform var(--tr);
  max-height:78vh;display:flex;flex-direction:column;overflow:hidden;
}
#filter-panel.open{transform:translateY(0);}
.fp-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:16px auto 0;flex-shrink:0;}
.fp-title{font-size:18px;font-weight:900;padding:14px 20px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.fp-scroll{flex:1;overflow-y:auto;padding:0 20px 8px;}
.fp-footer{padding:12px 20px 12px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.fp-clear{font-size:13px;font-weight:800;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;}
.fp-section{margin-bottom:22px;}
.fp-section-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--subtext);margin-bottom:10px;}
.radius-row{display:flex;align-items:center;gap:10px;}
.radius-slider{flex:1;accent-color:var(--primary);cursor:pointer;height:4px;}
.radius-slider:disabled{opacity:0.35;cursor:default;}
.fav-filter-wrap.disabled{opacity:0.4;pointer-events:none;}
.radius-val{font-size:14px;font-weight:900;color:var(--primary);min-width:40px;text-align:right;}
.radius-val.disabled{color:var(--subtext);}
/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.toggle-switch{position:relative;width:38px;height:22px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:background 0.2s;}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle-switch input:checked + .toggle-slider{background:var(--primary);}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(16px);}
.toggle-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--subtext);}
.rating-chips{display:flex;gap:8px;flex-wrap:wrap;}
.rchip{
  padding:6px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface2);color:var(--subtext);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all var(--tr);
}
.rchip.active{background:var(--primary);border-color:var(--primary);color:#000;}
.checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cb-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;}
.cb-item input{accent-color:var(--primary);width:16px;height:16px;cursor:pointer;}
.cb-item label{font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.fp-apply{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;
  cursor:pointer;
}

/* ── RESTAURANT DETAIL ── */
#detail-overlay{
  position:fixed;inset:0;z-index:600;
  background:linear-gradient(180deg,#FFF8E7 0%,#FDF0D9 100%);
  transform:translateX(100%);transition:transform var(--tr);
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-overlay.open{transform:translateX(0);}
.d-back{
  position:absolute;top:14px;left:14px;z-index:10;width:38px;height:38px;
  border-radius:50%;background:rgba(44,24,16,0.65);display:flex;align-items:center;
  justify-content:center;border:none;color:#fff;font-size:16px;cursor:pointer;
  backdrop-filter:blur(8px);
}
.d-fav{
  position:absolute;top:14px;right:14px;z-index:10;width:38px;height:38px;
  border-radius:50%;background:rgba(44,24,16,0.65);display:flex;align-items:center;
  justify-content:center;border:none;color:#fff;font-size:16px;cursor:pointer;
  backdrop-filter:blur(8px);transition:background var(--tr),transform 0.15s;
}
.d-fav.active{background:rgba(183,28,42,0.85);}
.d-fav:active{transform:scale(0.88);}
.d-img-wrap{height:230px;flex-shrink:0;position:relative;overflow:hidden;background:var(--surface2);}
.d-img-wrap img{width:100%;height:100%;object-fit:cover;}
.d-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px;}
.d-img-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.d-img-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:background 0.2s;}
.d-img-dot.active{background:#fff;}
.d-scroll{flex:1;overflow-y:auto;padding:20px;}
.d-name{font-size:24px;font-weight:900;margin-bottom:8px;}
.d-rating-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;cursor:pointer;width:fit-content;border-radius:8px;transition:opacity 0.15s;}
.d-rating-row:hover{opacity:0.75;}
.d-stars{color:var(--star);font-size:16px;font-weight:900;}
.d-rcount{color:var(--subtext);font-size:13px;text-decoration:underline;text-underline-offset:2px;}
.d-badges{display:flex;gap:6px;flex-wrap:wrap;}
.dbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;border:1px solid;}
.dbadge-style{background:var(--primary-dim);border-color:rgba(240,165,0,0.3);color:var(--primary);}
.dbadge-brand{background:rgba(100,180,255,0.1);border-color:rgba(100,180,255,0.3);color:var(--blue);}
.d-section{margin-top:22px;}
.d-section-title{font-size:16px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.d-section-title i{color:var(--primary);}
.d-desc{font-size:14px;line-height:1.75;color:var(--subtext);}
.d-divider{height:1px;background:var(--border);margin:22px 0;}
.d-address{
  display:flex;align-items:center;gap:8px;margin-top:16px;margin-bottom:4px;
  font-size:13px;font-weight:700;color:var(--blue);text-decoration:none;
  background:rgba(21,101,192,0.07);border:1px solid rgba(21,101,192,0.18);
  border-radius:10px;padding:9px 13px;width:fit-content;
  transition:background 0.2s;
}
.d-address:hover{background:rgba(21,101,192,0.13);}
.d-address i{font-size:14px;color:var(--blue);flex-shrink:0;}

/* Menu items */
.menu-item{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.mi-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px;}
.mi-name{font-size:14px;font-weight:800;flex:1;}
.mi-price{font-size:14px;font-weight:700;color:var(--primary);white-space:nowrap;}
.mi-rating{font-size:12px;color:var(--star);margin-bottom:4px;}
.mi-desc{font-size:12px;color:var(--subtext);line-height:1.5;}

/* Reviews */
.review-item{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.rv-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;flex-shrink:0;}
.rv-meta{flex:1;}
.rv-user{font-size:14px;font-weight:800;}
.rv-date{font-size:11px;color:var(--subtext);}
.rv-stars{color:var(--star);font-size:12px;margin-bottom:4px;}
.rv-text{font-size:13px;color:var(--subtext);line-height:1.6;}

/* Review form */
.review-form{background:var(--surface2);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border);}
.rf-title{font-size:15px;font-weight:900;margin-bottom:12px;}
.rv-signin-prompt{text-align:center;padding:8px 0 4px;}
.rv-signin-prompt p{font-size:13px;color:var(--subtext);margin-bottom:14px;line-height:1.5;}
.rv-signin-prompt .google-btn{max-width:280px;margin:0 auto;font-size:14px;padding:11px 16px;}
.star-input{display:flex;gap:8px;margin-bottom:12px;}
.si-star{font-size:30px;cursor:pointer;color:var(--border);transition:color 0.15s,transform 0.15s;user-select:none;}
.si-star.lit{color:var(--star);}
.si-star:hover{color:var(--star);transform:scale(1.15);}
.rv-textarea{
  width:100%;background:var(--surface3);border:1px solid var(--border);
  border-radius:10px;padding:12px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:14px;resize:none;height:88px;margin-bottom:12px;outline:none;line-height:1.5;
}
.rv-textarea::placeholder{color:var(--subtext);}
.rv-textarea:focus{border-color:var(--primary);}
.rv-submit{
  width:100%;padding:12px;background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;
}
.no-reviews{text-align:center;color:var(--subtext);font-size:14px;padding:20px 0;}

/* ── SPECIALS PAGE ── */
#specials-page{overflow:hidden;}
.specials-tab-bar{
  display:flex;gap:10px;padding:12px 12px 12px;flex-shrink:0;background:var(--surface);
  border-bottom:1px solid var(--border);
}
.spec-tab{
  flex:1;padding:13px 8px;border:1px solid var(--border);background:var(--surface);
  border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:var(--subtext);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;
  justify-content:center;gap:6px;letter-spacing:0.2px;
  box-shadow:0 2px 6px rgba(44,24,16,0.07);
}
.spec-tab:hover{border-color:var(--subtext);color:var(--text);}
#spec-tab-daily.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
#spec-tab-event.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
#spec-tab-holiday.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);}
.spec-tab-pill{
  font-size:10px;font-weight:900;padding:1px 6px;border-radius:20px;
  background:var(--surface3);color:var(--subtext);transition:all var(--tr);
}
#spec-tab-daily.active .spec-tab-pill{background:rgba(46,125,50,0.2);color:var(--green);}
#spec-tab-event.active .spec-tab-pill{background:rgba(183,28,42,0.2);color:var(--accent);}
#spec-tab-holiday.active .spec-tab-pill{background:rgba(212,146,10,0.2);color:var(--primary);}
.specials-content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;}
.specials-section-hdr{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:var(--subtext);padding:8px 4px 4px;}
.special-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:all var(--tr);
  flex-shrink:0;
}
.special-card:active{border-color:var(--accent);transform:scale(0.99);}
.sc-header{padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.sc-emoji{font-size:36px;flex-shrink:0;line-height:1;}
.sc-info{flex:1;}
.sc-restaurant{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.sc-title{font-size:16px;font-weight:900;margin-bottom:4px;}
.sc-desc{font-size:13px;color:var(--subtext);line-height:1.5;}
.sc-footer{padding:9px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.sc-type{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;}
.sct-daily{background:var(--green-dim);color:var(--green);}
.sct-event{background:var(--accent-dim);color:var(--accent);}
.sct-holiday{background:var(--primary-dim);color:var(--primary);}
.sc-expires{font-size:11px;color:var(--subtext);}

/* ── PROFILE PAGE ── */
#profile-page{overflow-y:auto;}
.profile-content{padding-bottom:28px;}
/* Profile tab bar */
.prof-tab-bar{display:flex;gap:10px;padding:16px 16px 0;flex-shrink:0;}
.prof-tab{
  flex:1;padding:11px 8px;border:1px solid var(--border);background:var(--surface);
  border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:var(--subtext);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;
  justify-content:center;gap:6px;box-shadow:0 2px 6px rgba(44,24,16,0.07);
}
#prof-tab-reviews.active{background:var(--green-dim);border-color:var(--green);color:var(--green);}
#prof-tab-favorites.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.prof-tab-pill{
  font-size:10px;font-weight:900;padding:1px 6px;border-radius:20px;
  background:var(--surface3);color:var(--subtext);transition:all var(--tr);
}
#prof-tab-reviews.active .prof-tab-pill{background:rgba(46,125,50,0.2);color:var(--green);}
#prof-tab-favorites.active .prof-tab-pill{background:rgba(183,28,42,0.2);color:var(--accent);}
/* Favorites card on profile */
.fav-card{
  background:var(--surface);border-radius:var(--radius);overflow:hidden;
  display:flex;cursor:pointer;border:1px solid var(--border);
  transition:all var(--tr);flex-shrink:0;margin-bottom:8px;
}
.fav-card:active{border-color:var(--accent);transform:scale(0.99);}
.fav-card-img{width:56px;min-height:56px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.fav-card-body{padding:10px 12px;flex:1;min-width:0;}
.fav-card-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fav-card-meta{display:flex;align-items:center;gap:6px;margin-top:3px;}
.fav-card-rating{font-size:12px;font-weight:700;color:var(--star);}
.fav-card-dist{font-size:11px;color:var(--subtext);}
.fav-card-rm{background:none;border:none;color:var(--subtext);font-size:14px;cursor:pointer;padding:8px;flex-shrink:0;transition:color var(--tr);}
.fav-card-rm:hover{color:var(--accent);}
.profile-hero{
  background:linear-gradient(160deg,var(--surface2) 0%,var(--surface) 100%);
  padding:24px 20px 20px;border-bottom:1px solid var(--border);
}
.ph-top{display:flex;gap:18px;align-items:center;margin-bottom:18px;}
.ph-avatar-wrap{position:relative;flex-shrink:0;}
.ph-avatar{
  width:78px;height:78px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:30px;font-weight:900;color:#000;
  border:3px solid var(--primary);overflow:hidden;cursor:pointer;
}
.ph-avatar img{width:100%;height:100%;object-fit:cover;}
.ph-avatar-edit{
  position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--primary);
  border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:2px solid var(--bg);
}
.ph-avatar-edit i{font-size:10px;color:#000;}
.ph-info{flex:1;}
.ph-nickname{font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;}
.ph-edit-nick{background:none;border:none;color:var(--subtext);font-size:14px;cursor:pointer;padding:2px 4px;}
.ph-level-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-dim);border:1px solid rgba(240,165,0,0.35);
  border-radius:20px;padding:4px 12px;margin-top:6px;
}
.plb-emoji{font-size:15px;}
.plb-name{font-size:12px;font-weight:800;color:var(--primary);}
.ph-stats{display:flex;gap:0;}
.ph-stat{flex:1;text-align:center;padding:12px 0;border-right:1px solid var(--border);}
.ph-stat:last-child{border-right:none;}
.ps-val{font-size:20px;font-weight:900;color:var(--primary);}
.ps-label{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--subtext);letter-spacing:0.5px;margin-top:2px;}

.ac-body{padding:16px 16px 0;}
.level-progress-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.lpc-header{display:flex;justify-content:space-between;margin-bottom:8px;align-items:center;}
.lpc-title{font-size:14px;font-weight:800;}
.lpc-next{font-size:12px;color:var(--subtext);}
.prog-bar{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;transition:width 0.7s ease;}
.lpc-desc{font-size:12px;color:var(--subtext);}

.ac-section{margin-bottom:20px;}
.ac-section-title{font-size:18px;font-weight:900;margin-bottom:12px;}
.my-rev-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.mrc-restaurant{font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.mrc-stars{color:var(--star);font-size:13px;margin-bottom:5px;}
.mrc-text{font-size:13px;color:var(--subtext);line-height:1.5;}
.mrc-date{font-size:10px;color:var(--border);margin-top:6px;}
.empty-revs{text-align:center;color:var(--subtext);padding:32px 0;}
.empty-revs i{font-size:42px;color:var(--border);display:block;margin-bottom:12px;}
.empty-revs p{font-size:14px;font-weight:600;}

/* Nickname modal */
#nick-modal{position:fixed;inset:0;z-index:700;display:none;align-items:flex-end;}
#nick-modal.open{display:flex;}
/* Sign-in modal */
#signin-modal{position:fixed;inset:0;z-index:710;display:none;align-items:center;justify-content:center;padding:20px;}
#signin-modal.open{display:flex;}
.sm-backdrop{position:absolute;inset:0;background:rgba(44,24,16,0.55);backdrop-filter:blur(3px);}
.sm-card-wrap{position:relative;z-index:1;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;border-radius:20px;}
.sm-card-wrap .profile-signin-card{margin:0;}
.nm-backdrop{position:absolute;inset:0;background:rgba(44,24,16,0.45);}
.nm-panel{
  position:relative;width:100%;background:var(--surface);
  border-radius:20px 20px 0 0;padding:24px 20px 36px;z-index:1;
}
.nm-title{font-size:18px;font-weight:900;margin-bottom:14px;}
.nm-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:16px;outline:none;margin-bottom:14px;
}
.nm-input:focus{border-color:var(--primary);}
.nm-save{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;}

/* Loading screen */
/* ── SHARED GOOGLE BUTTON ── */
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;border-radius:12px;cursor:pointer;
  background:#fff;border:1.5px solid #dadce0;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#3c4043;
  transition:box-shadow 0.2s,background 0.2s;
}
.google-btn:hover{background:#f8f9fa;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.google-btn svg{flex-shrink:0;}
.login-privacy{font-size:11px;color:var(--subtext);margin-top:18px;line-height:1.5;opacity:0.8;}
.ph-email{font-size:11px;color:var(--subtext);margin-top:2px;opacity:0.8;}

/* ── PROFILE SIGN-IN CARD ── */
.profile-signin-card{
  margin:32px 20px;background:var(--surface);border-radius:20px;
  padding:40px 24px 32px;text-align:center;
  border:1px solid var(--border);box-shadow:0 4px 24px rgba(44,24,16,0.08);
}
.psc-logo{font-size:52px;margin-bottom:12px;}
.psc-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:8px;}
.psc-sub{font-size:13px;color:var(--subtext);margin-bottom:20px;line-height:1.6;}
.psc-benefits{list-style:none;text-align:left;margin-bottom:24px;display:flex;flex-direction:column;gap:10px;}
.psc-benefits li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text);font-weight:700;line-height:1.4;}
.psc-benefits li span.psc-icon{font-size:18px;flex-shrink:0;margin-top:-1px;}
.psc-benefits li span.psc-desc{color:var(--subtext);font-weight:600;}

/* ── SIGN-OUT BUTTON ── */
.signout-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface3);color:var(--subtext);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr);
  flex-shrink:0;margin-left:auto;
}
.signout-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

#loading-screen{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(160deg,#FFF8E7 0%,#FDE8C0 55%,#F5D49A 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity 0.5s ease;
}
#loading-screen.hide{opacity:0;pointer-events:none;}
.ls-logo{font-size:72px;animation:hotdog-bounce 0.9s ease-in-out infinite alternate;}
@keyframes hotdog-bounce{from{transform:rotate(-8deg) translateY(0);}to{transform:rotate(8deg) translateY(-14px);}}
.ls-title{font-size:30px;font-weight:900;letter-spacing:-0.5px;color:var(--text);}
.ls-title .ac{color:var(--accent);}
.ls-sub{color:var(--subtext);}
.ls-sub{font-size:14px;color:var(--subtext);}
.ls-dots{display:flex;gap:8px;}
.ls-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:ldot 1.2s ease-in-out infinite;}
.ls-dot:nth-child(2){animation-delay:0.2s;}
.ls-dot:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{transform:scale(0.7);opacity:0.4;}40%{transform:scale(1.1);opacity:1;}}

/* Toast */
#toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface);border:1px solid var(--border);border-radius:30px;
  padding:10px 20px;font-size:14px;font-weight:700;z-index:900;
  transition:transform 0.3s ease;box-shadow:0 4px 20px rgba(44,24,16,0.2);
  white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast i{margin-right:7px;color:var(--primary);}

/* Leaflet light overrides */
.leaflet-container{background:#F5ECD7!important;}
.leaflet-control-zoom{border:none!important;}
.leaflet-control-zoom a{
  background:var(--surface)!important;color:var(--text)!important;
  border:1px solid var(--border)!important;
  width:36px!important;height:36px!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  line-height:1!important;font-size:18px!important;
}
.leaflet-control-zoom-in{border-radius:20px 20px 0 0!important;border-bottom:none!important;}
.leaflet-control-zoom-out{border-radius:0 0 20px 20px!important;}
.leaflet-bar{box-shadow:0 2px 12px rgba(44,24,16,0.18)!important;border-radius:20px!important;}
/* Controls must sit above Leaflet's map pane (z-index:400) but below our overlays (filter:500, detail:600) */
.leaflet-control-container{z-index:450!important;}
.leaflet-top,.leaflet-bottom{z-index:450!important;}
/* Equal gap from nav bar top and right edge */
.leaflet-bottom.leaflet-right{bottom:12px!important;}
.leaflet-bottom .leaflet-control{margin-bottom:0!important;}
.leaflet-right .leaflet-control{margin-right:12px!important;}
.leaflet-control-attribution{
  font-size:9px!important;opacity:0.5;background:rgba(255,255,255,0.6)!important;
  border-radius:4px 0 0 4px!important;padding:2px 5px!important;
  backdrop-filter:blur(2px);
}
.leaflet-popup-content-wrapper{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Utility */
.flex-center{display:flex;align-items:center;justify-content:center;}
.hidden{display:none!important;}

/* ── DESKTOP MAX WIDTH ── */
@media (min-width: 801px) {
  /* Sort bar: full-width white background, content aligned to 800px zone */
  .sort-bar{padding-left:calc((100vw - 800px) / 2 + 12px);padding-right:calc((100vw - 800px) / 2 + 12px);}
  /* List cards: centered at 800px using padding (keeps scrollbar at far right) */
  .list-inner{padding-left:calc((100vw - 800px) / 2 + 10px);padding-right:calc((100vw - 800px) / 2 + 10px);}
  /* Detail overlay: content below hero centered at 800px */
  .d-scroll{max-width:800px;width:100%;margin:0 auto;}
  /* Specials tab bar: full-width white background, content aligned to 800px zone */
  .specials-tab-bar{padding-left:calc((100vw - 800px) / 2 + 12px);padding-right:calc((100vw - 800px) / 2 + 12px);}
  /* Specials cards: centered at 800px using padding (keeps scrollbar at far right) */
  .specials-content{padding-left:calc((100vw - 800px) / 2 + 12px);padding-right:calc((100vw - 800px) / 2 + 12px);}
  /* Profile hero: full-width gradient background, content aligned to 800px zone */
  .profile-hero{padding-left:calc((100vw - 800px) / 2 + 20px);padding-right:calc((100vw - 800px) / 2 + 20px);}
  /* Profile body and tab bar: centered at 800px */
  .ac-body,.prof-tab-bar{max-width:800px;width:100%;margin:0 auto;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOADING SCREEN
══════════════════════════════════════════════ -->
<div id="loading-screen">
  <div class="ls-logo">🌭</div>
  <div class="ls-title">Frank <span class="ac">Finder</span></div>
  <div class="ls-sub">Finding the best dogs near you…</div>
  <div class="ls-dots">
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
    <div class="ls-dot"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════ -->
<div id="app">

  <!-- ── LOCATOR PAGE ── -->
  <div id="locator-page" class="page active">
    <div class="page-header">
      <span style="font-size:24px;">🌭</span>
      <div class="page-title">Frank <span class="accent">Finder</span></div>
      <div class="view-toggle">
        <button class="toggle-btn active" id="map-toggle" onclick="setView('map')">
          <i class="fa-solid fa-map"></i> Map
        </button>
        <button class="toggle-btn" id="list-toggle" onclick="setView('list')">
          <i class="fa-solid fa-list"></i> List
        </button>
      </div>
      <button class="filter-btn" id="filter-btn" onclick="openFilters()" title="Filters">
        <i class="fa-solid fa-sliders"></i>
      </button>
    </div>

    <!-- Map View -->
    <div id="map-container">
      <div class="map-info-bar">
        <i class="fa-solid fa-location-dot"></i>
        <span class="mib-text" id="map-location-text">Locating you…</span>
        <span class="map-count" id="map-count">0</span>
      </div>
      <div id="map"></div>
    </div>

    <!-- List View -->
    <div id="list-view">
      <div class="sort-bar">
        <span class="sort-label">Sort:</span>
        <select class="sort-select" id="sort-select" onchange="renderList()">
          <option value="distance">Distance</option>
          <option value="rating">Rating (High→Low)</option>
          <option value="reviews">Most Reviews</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="list-inner" id="list-inner"></div>
    </div>
  </div>

  <!-- ── SPECIALS PAGE ── -->
  <div id="specials-page" class="page">
    <div class="page-header">
      <span style="font-size:22px;">🔥</span>
      <div class="page-title">Hot <span class="accent">Specials</span></div>
    </div>
    <div class="specials-tab-bar">
      <button class="spec-tab active" id="spec-tab-daily" onclick="setSpecialsTab('daily')">
        🗓️ Daily <span class="spec-tab-pill" id="spec-pill-daily"></span>
      </button>
      <button class="spec-tab" id="spec-tab-event" onclick="setSpecialsTab('event')">
        🎉 Events <span class="spec-tab-pill" id="spec-pill-event"></span>
      </button>
      <button class="spec-tab" id="spec-tab-holiday" onclick="setSpecialsTab('holiday')">
        🎊 Holidays <span class="spec-tab-pill" id="spec-pill-holiday"></span>
      </button>
    </div>
    <div class="specials-content" id="specials-content"></div>
  </div>

  <!-- ── PROFILE PAGE ── -->
  <div id="profile-page" class="page">
    <div class="page-header">
      <span style="font-size:22px;">👤</span>
      <div class="page-title">My <span class="accent">Profile</span></div>
      <button class="signout-btn" id="signout-btn" onclick="signOutUser()" title="Sign out" style="display:none;">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
    <div class="profile-content" id="profile-content"></div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-locator" onclick="navTo('locator')">
      <i class="fa-solid fa-location-dot"></i>
      Locator
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-specials" onclick="navTo('specials')">
      <i class="fa-solid fa-tag"></i>
      Specials
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-profile" onclick="navTo('profile')">
      <i class="fa-solid fa-user"></i>
      Profile
      <div class="nav-dot"></div>
    </button>
  </nav>
</div>

<!-- ── FILTER PANEL ── -->
<div id="filter-overlay" onclick="closeFilters()"></div>
<div id="filter-panel">
  <div class="fp-handle"></div>
  <div class="fp-title">
    Filters
    <button class="fp-clear" onclick="clearFilters()">Clear All</button>
  </div>

  <div class="fp-scroll">
    <div class="fp-section" style="margin-bottom:14px;">
      <div class="toggle-wrap fav-filter-wrap" id="fav-filter-wrap" style="margin-bottom:0;">
        <label class="toggle-switch">
          <input type="checkbox" id="favorites-toggle">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Favorites Only ❤️</span>
      </div>
    </div>

    <div class="fp-section">
      <div class="toggle-wrap">
        <label class="toggle-switch">
          <input type="checkbox" id="distance-toggle" onchange="updateDistanceToggle(this.checked)">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Distance Filter</span>
      </div>
      <div class="radius-row">
        <input type="range" class="radius-slider" id="radius-slider" min="1" max="100" value="25" disabled oninput="document.getElementById('radius-val').textContent=this.value+'mi'">
        <span class="radius-val disabled" id="radius-val">Any</span>
      </div>
    </div>

    <div class="fp-section">
      <div class="fp-section-label">Minimum Rating</div>
      <div class="rating-chips">
        <button class="rchip active" data-min="0" onclick="selectRatingChip(this,0)">Any</button>
        <button class="rchip" data-min="3" onclick="selectRatingChip(this,3)">★ 3+</button>
        <button class="rchip" data-min="3.5" onclick="selectRatingChip(this,3.5)">★ 3.5+</button>
        <button class="rchip" data-min="4" onclick="selectRatingChip(this,4)">★ 4+</button>
        <button class="rchip" data-min="4.5" onclick="selectRatingChip(this,4.5)">★ 4.5+</button>
      </div>
    </div>

    <div class="fp-section">
      <div class="fp-section-label">Hotdog Style</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="style-cb" value="Chili Dog"><label>🌶️ Chili Dog</label></label>
        <label class="cb-item"><input type="checkbox" class="style-cb" value="Italian Hotdog"><label>🇮🇹 Italian Dog</label></label>
        <label class="cb-item"><input type="checkbox" class="style-cb" value="Corndog"><label>🌽 Corndog</label></label>
        <label class="cb-item"><input type="checkbox" class="style-cb" value="Coney Dog"><label>🏙️ Coney Dog</label></label>
        <label class="cb-item"><input type="checkbox" class="style-cb" value="Sonoran"><label>🌵 Sonoran</label></label>
      </div>
    </div>

    <div class="fp-section">
      <div class="fp-section-label">Brand Offered</div>
      <div class="checkbox-grid">
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Thumann's"><label>Thumann's</label></label>
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Sabrett"><label>Sabrett</label></label>
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Nathan's"><label>Nathan's</label></label>
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Hebrew National"><label>Hebrew Nat'l</label></label>
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Ball Park"><label>Ball Park</label></label>
        <label class="cb-item"><input type="checkbox" class="brand-cb" value="Oscar Mayer"><label>Oscar Mayer</label></label>
      </div>
    </div>
  </div>

  <div class="fp-footer">
    <button class="fp-apply" onclick="applyFilters()">Apply Filters</button>
  </div>
</div>

<!-- ── RESTAURANT DETAIL OVERLAY ── -->
<div id="detail-overlay">
  <button class="d-back" onclick="closeDetail()"><i class="fa-solid fa-arrow-left"></i></button>
  <button class="d-fav" id="d-fav-btn" onclick="toggleFavorite()"><i class="fa-regular fa-heart"></i></button>
  <div class="d-img-wrap" id="d-img-wrap">
    <div class="d-img-placeholder" id="d-img-placeholder"></div>
    <div class="d-img-dots" id="d-img-dots"></div>
  </div>
  <div class="d-scroll" id="d-scroll">
    <!-- populated by JS -->
  </div>
</div>

<!-- ── NICKNAME MODAL ── -->
<div id="nick-modal">
  <div class="nm-backdrop" onclick="closeNickModal()"></div>

    <div class="nm-title">Edit Nickname</div>
    <input class="nm-input" id="nm-input" type="text" placeholder="Your hotdog alias…" maxlength="24">
    <button class="nm-save" onclick="saveNickname()">Save</button>
  </div>
</div>

<div id="signin-modal">

  <div class="sm-card-wrap" id="signin-modal-content"></div>
</div>

// ═══════════════════════════════════════════
//  UTILITY FUNCTIONS
// ═══════════════════════════════════════════

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderStars(rating, size=13) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return `<span style="color:var(--star);font-size:${size}px;font-weight:700;">${s}</span> <span style="font-size:${size}px;font-weight:700;">${rating.toFixed(1)}</span>`;
}

function starsEmoji(rating) {
  const n = Math.round(rating);
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function getRestaurantById(id) {
  return RESTAURANTS.find(r => r.id === id);
}

function showToast(msg, icon='star') {
  const t = document.getElementById('toast');
  t.innerHTML = `<i class="fa-solid fa-${icon}"></i>${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function getLevelInfo(reviewCount) {
  for (const l of [...LEVELS].reverse()) {
    if (reviewCount >= l.min) return l;
  }
  return LEVELS[0];
}

function getLevelProgress(reviewCount) {
  const levels = LEVELS.filter(l => l.max !== Infinity);
  for (let i = 0; i < levels.length; i++) {
    const l = levels[i];
    if (reviewCount >= l.min && reviewCount <= l.max) {
      const range = l.max - l.min + 1;
      const progress = reviewCount - l.min;
      return { pct: (progress / range) * 100, current: reviewCount, needed: l.max + 1, levelMax: l.max };
    }
  }
  return { pct: 100, current: reviewCount, needed: null, levelMax: null };
}

function getFilteredRestaurants() {
  const { distanceEnabled, radius, minRating, styles, brands, favoritesOnly } = state.filters;
  const { lat, lng } = state.userLocation;
  return RESTAURANTS.filter(r => {
    const dist = haversine(lat, lng, r.lat, r.lng);
    if (distanceEnabled && dist > radius) return false;
    if (r.rating < minRating) return false;
    if (styles.length > 0 && !styles.some(s => r.styles.includes(s))) return false;
    if (brands.length > 0 && !brands.some(b => r.brands.includes(b))) return false;
    if (favoritesOnly && !state.user.favorites.includes(r.id)) return false;
    return true;
  }).map(r => ({ ...r, distance: haversine(lat, lng, r.lat, r.lng) }));
}

    document.getElementById(`${p}-page`).classList.toggle('active', p === page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });
  if (page === 'locator' && state.map) {
    setTimeout(() => state.map.invalidateSize(), 100);
  }
  if (page === 'specials') renderSpecials();
  if (page === 'profile') renderProfile();
}

//  MAP
// ═══════════════════════════════════════════

function initMap() {
  if (state.mapInited) return;
  state.mapInited = true;

  const map = L.map('map', {
    center: [state.userLocation.lat, state.userLocation.lng],
    zoom: 12,
    zoomControl: false,
    attributionControl: false,
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.control.attribution({ position: 'topright', prefix: false }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  state.map = map;

  // User location pulse marker
  const userIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
      <div class="user-pulse" style="position:absolute;"></div>
      <div class="user-pin"></div>
    </div>`,
    iconSize: [40, 40],
    iconAnchor: [20, 20],
  });
  state.userMarker = L.marker([state.userLocation.lat, state.userLocation.lng], { icon: userIcon })
    .addTo(map)
    .bindPopup('<b>You are here</b>');

  renderMapMarkers();

  // Re-render markers on zoom so compact/full pins update
  map.on('zoomend', () => renderMapMarkers());

  // Try geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      state.map.setView([state.userLocation.lat, state.userLocation.lng], 12);
      state.userMarker.setLatLng([state.userLocation.lat, state.userLocation.lng]);
      document.getElementById('map-location-text').textContent = 'Near your location';
      renderMapMarkers();
      renderList();
    }, () => {
      document.getElementById('map-location-text').textContent = 'New Jersey (demo)';
    });
  } else {
    document.getElementById('map-location-text').textContent = 'New Jersey (demo)';
  }
}

function renderMapMarkers() {
  state.markers.forEach(m => m.remove());
  state.markers = [];

  const filtered = getFilteredRestaurants();
  document.getElementById('map-count').textContent = filtered.length;

  // Zoom <= 10 ≈ 35+ mile radius view → compact emoji pins to reduce clutter
  const compact = state.map && state.map.getZoom() <= 10;

  filtered.forEach(r => {
    const bubbleHTML = compact
      ? `<div class="map-bubble compact">
           <span class="me">🌭</span>
           <span class="mr">★${r.rating}</span>
         </div>`
      : `<div class="map-bubble">
           <span class="mn">${r.name}</span>
           <span class="mr">★${r.rating}</span>
         </div>`;

    const icon = L.divIcon({
      className: '',
      html: `<div class="map-marker-outer" id="mm-${r.id}">
        ${bubbleHTML}
        <div class="map-pin-tri"></div>
      </div>`,
      iconSize: compact ? [58, 36] : [140, 44],
      iconAnchor: compact ? [29, 36] : [70, 44],
      popupAnchor: [0, -44],
    });

    const marker = L.marker([r.lat, r.lng], { icon })
      .addTo(state.map)
      .on('click', () => openDetail(r.id));

    state.markers.push(marker);
  });

  // No auto-fitBounds — map stays at user's chosen zoom level
}

// ═══════════════════════════════════════════

function setView(view) {
  state.locatorView = view;
  document.getElementById('map-toggle').classList.toggle('active', view === 'map');
  document.getElementById('list-toggle').classList.toggle('active', view === 'list');
  document.getElementById('map-container').style.display = view === 'map' ? '' : 'none';
  const listEl = document.getElementById('list-view');
  if (view === 'list') {
    listEl.classList.add('visible');
    renderList();
  } else {
    listEl.classList.remove('visible');
    if (state.map) setTimeout(() => state.map.invalidateSize(), 100);
  }
}

function renderList() {
  const sortBy = document.getElementById('sort-select').value;
  let restaurants = getFilteredRestaurants();

  restaurants.sort((a, b) => {
    if (sortBy === 'distance') return a.distance - b.distance;
    if (sortBy === 'rating') return b.rating - a.rating;
    if (sortBy === 'reviews') return b.reviewCount - a.reviewCount;
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    return 0;
  });

  const container = document.getElementById('list-inner');
  if (restaurants.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--subtext);">
      <div style="font-size:48px;margin-bottom:12px;">🌭</div>
      <div style="font-size:16px;font-weight:700;">No spots found</div>
      <div style="font-size:13px;margin-top:6px;">Try adjusting your filters</div>
    </div>`;
    return;
  }

  container.innerHTML = restaurants.map(r => `
    <div class="restaurant-card" onclick="openDetail(${r.id})">
      <div class="card-img" style="background:${r.bg};">${r.emoji}</div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">
          <div class="card-rating">★ ${r.rating.toFixed(1)}</div>
          <div class="card-rcount">(${r.reviewCount.toLocaleString()})</div>
          <div class="card-dist">${r.distance.toFixed(1)} mi</div>
        </div>
        <div class="card-specialty">🏆 ${r.topSpecialty}</div>
        <div class="card-tags">
          ${r.styles.slice(0,2).map(s => `<span class="ctag">${s}</span>`).join('')}
          ${r.brands.slice(0,1).map(b => `<span class="ctag">${b}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function openFilters() {

function closeFilters() {

}

function selectRatingChip(el, val) {
  document.querySelectorAll('.rchip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  el.dataset.selectedVal = val;
}

function updateDistanceToggle(enabled) {
  const slider = document.getElementById('radius-slider');
  const valEl = document.getElementById('radius-val');
  slider.disabled = !enabled;
  if (enabled) {
    valEl.textContent = slider.value + 'mi';
    valEl.classList.remove('disabled');
  } else {
    valEl.textContent = 'Any';
    valEl.classList.add('disabled');
  }
}

function applyFilters() {
  state.filters.favoritesOnly = document.getElementById('favorites-toggle').checked;
  state.filters.distanceEnabled = document.getElementById('distance-toggle').checked;
  state.filters.radius = parseInt(document.getElementById('radius-slider').value);
  const activeChip = document.querySelector('.rchip.active');
  state.filters.minRating = activeChip ? parseFloat(activeChip.dataset.min) : 0;
  state.filters.styles = [...document.querySelectorAll('.style-cb:checked')].map(c => c.value);
  state.filters.brands = [...document.querySelectorAll('.brand-cb:checked')].map(c => c.value);

  const hasFilters = state.filters.minRating > 0 || state.filters.styles.length > 0 || state.filters.brands.length > 0 || state.filters.distanceEnabled || state.filters.favoritesOnly;
  document.getElementById('filter-btn').classList.toggle('active', hasFilters);

  closeFilters();
  renderMapMarkers();
  if (state.locatorView === 'list') renderList();
  showToast('Filters applied', 'filter');
}

function clearFilters() {
  state.filters = { distanceEnabled:false, radius:25, minRating:0, styles:[], brands:[], favoritesOnly:false };
  document.getElementById('favorites-toggle').checked = false;
  document.getElementById('distance-toggle').checked = false;
  document.getElementById('radius-slider').value = 25;
  updateDistanceToggle(false);
  document.querySelectorAll('.rchip').forEach((c,i) => c.classList.toggle('active', i===0));
  document.querySelectorAll('.style-cb, .brand-cb').forEach(c => c.checked = false);
  document.getElementById('filter-btn').classList.remove('active');
  closeFilters();
  renderMapMarkers();
  if (state.locatorView === 'list') renderList();
  showToast('Filters cleared', 'xmark');
}

}

function setReviewStar(val) {
  state.reviewStarInput = val;
  document.querySelectorAll('.si-star').forEach(s => {
    s.classList.toggle('lit', parseInt(s.dataset.val) <= val);
  });
}

async function submitReview(restaurantId) {
  const text = document.getElementById('rv-textarea').value.trim();
  if (!state.reviewStarInput) { showToast('Please select a star rating', 'triangle-exclamation'); return; }
  if (text.length < 10) { showToast('Write at least 10 characters', 'triangle-exclamation'); return; }

  const review = {
    restaurantId,
    rating:       state.reviewStarInput,
    text,
    date:         new Date().toISOString().split('T')[0],
    userId:       currentUser ? currentUser.uid : 'guest',
    userNickname: state.user.nickname,
    createdAt:    firebase.firestore.FieldValue.serverTimestamp()
  };

  // Write to Firestore
  if (currentUser) {
    try {
      await db.collection('reviews').add(review);
      await db.collection('users').doc(currentUser.uid).update({
        visitCount: firebase.firestore.FieldValue.increment(1)
      });
    } catch(e) { console.warn('Firestore review write failed:', e); }
  }

  // Update local state
  state.user.reviews.unshift(review);
  state.user.visitCount++;
  const r = RESTAURANTS.find(x => x.id === restaurantId);
  if (r) r.reviewCount++;

  showToast('Review submitted! Thanks, ' + state.user.nickname + '!', 'check');
  openDetail(restaurantId); // Refresh detail view
}

function loadFavorites() {
  try {
    const saved = localStorage.getItem('ff_favorites');
    if (saved) state.user.favorites = JSON.parse(saved);
  } catch(e) {}
}

function saveFavorites() {
  try {
    localStorage.setItem('ff_favorites', JSON.stringify(state.user.favorites));
  } catch(e) {}
}

let pendingFavoriteId = null; // restaurant to auto-favorite after sign-in

function toggleFavorite() {
  if (!currentUser) {
    pendingFavoriteId = state.selectedRestaurantId; // remember what they wanted to save
    openSignInModal();
    return;
  }
  const id = state.selectedRestaurantId;
  if (!id) return;
  const idx = state.user.favorites.indexOf(id);
  if (idx === -1) {
    state.user.favorites.push(id);
    showToast('Added to favorites', 'heart');
  } else {
    state.user.favorites.splice(idx, 1);
    showToast('Removed from favorites', 'heart-crack');
  }
  saveFavorites();
  updateFavBtn();
  if (state.filters.favoritesOnly) {
    renderMapMarkers();
    if (state.locatorView === 'list') renderList();
  }
  if (state.page === 'profile') renderProfile();
}

function updateFavBtn() {
  const btn = document.getElementById('d-fav-btn');
  if (!btn) return;
  const isFav = state.user.favorites.includes(state.selectedRestaurantId);
  btn.classList.toggle('active', isFav);
  btn.innerHTML = isFav
    ? '<i class="fa-solid fa-heart"></i>'
    : '<i class="fa-regular fa-heart"></i>';
}

  state.profileTab = tab;
  document.getElementById('prof-tab-reviews').classList.toggle('active', tab === 'reviews');
  document.getElementById('prof-tab-favorites').classList.toggle('active', tab === 'favorites');

        <div class="mrc-restaurant">${r ? r.name : 'Unknown'}</div>
        <div class="mrc-stars">${starsEmoji(rv.rating)} ${rv.rating.toFixed(1)}</div>
        <div class="mrc-text">${rv.text}</div>
        <div class="mrc-date">${formatDate(rv.date)}</div>
      </div>
    `;
  }).join('');

  // Prefer the Google photo URL from the signed-in user; fall back to session upload
  const googlePhoto = currentUser.photoURL || null;
  const displayPhoto = googlePhoto || photoUrl;
  const avatarInner = displayPhoto
    ? `<img src="${displayPhoto}" alt="avatar" referrerpolicy="no-referrer">`
    : `<span>${nickname[0].toUpperCase()}</span>`;

  const emailLine = `<div class="ph-email">${currentUser.email}</div>`;

  document.getElementById('profile-content').innerHTML = `
    <div class="profile-hero">
      <div class="ph-top">
        <div class="ph-avatar-wrap">
          <div class="ph-avatar" onclick="document.getElementById('avatar-file-input').click()" style="background:var(--primary);">
            ${avatarInner}
          </div>
          <div class="ph-avatar-edit" onclick="document.getElementById('avatar-file-input').click()">
            <i class="fa-solid fa-camera"></i>
          </div>
        </div>
        <div class="ph-info">
          <div class="ph-nickname">
            ${nickname}
            <button class="ph-edit-nick" onclick="openNickModal()" title="Edit nickname"><i class="fa-solid fa-pen"></i></button>
          </div>
          ${emailLine}
          <div class="ph-level-badge">
            <span class="plb-emoji">${level.emoji}</span>
            <span class="plb-name">${level.name}</span>
          </div>
        </div>
      </div>
      <div class="ph-stats">
        <div class="ph-stat">
          <div class="ps-val">${reviews.length}</div>
          <div class="ps-label">Reviews</div>
        </div>
        <div class="ph-stat">
          <div class="ps-val">${state.user.favorites.length}</div>
          <div class="ps-label">Favorites</div>
        </div>
        <div class="ph-stat">
          <div class="ps-val">${reviews.length > 0 ? (reviews.reduce((a,r)=>a+r.rating,0)/reviews.length).toFixed(1) : '—'}</div>
          <div class="ps-label">Avg Rating</div>
        </div>
      </div>
    </div>

    <div class="ac-body">
      <div class="level-progress-card">
        <div class="lpc-header">
          <span class="lpc-title">${level.emoji} ${level.name}</span>
          <span class="lpc-next">${nextLevel ? `Next: ${nextLevel.name}` : '🏆 Max Level!'}</span>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${Math.min(progress.pct,100)}%;"></div>
        </div>
        <div class="lpc-desc">${nextLevel ? `${progress.needed - progress.current} more review${progress.needed - progress.current !== 1 ? 's' : ''} to reach ${nextLevel.name}` : 'You\'ve reached the pinnacle of frankfurter fandom!'}</div>
      </div>
    </div>

    <div class="prof-tab-bar">
      <button class="prof-tab ${state.profileTab === 'reviews' ? 'active' : ''}" id="prof-tab-reviews" onclick="setProfileTab('reviews')">
        ✍️ Reviews <span class="prof-tab-pill">${reviews.length}</span>
      </button>
      <button class="prof-tab ${state.profileTab === 'favorites' ? 'active' : ''}" id="prof-tab-favorites" onclick="setProfileTab('favorites')">
        ❤️ Favorites <span class="prof-tab-pill">${state.user.favorites.length}</span>
      </button>
    </div>

    <div class="ac-body">
      <div id="prof-panel-reviews" style="display:${state.profileTab === 'reviews' ? '' : 'none'};">
        ${reviews.length === 0
          ? `<div class="empty-revs"><i class="fa-solid fa-comment-slash"></i><p>No reviews yet. Find a dog and share your thoughts!</p></div>`
          : myReviews
        }
      </div>
      <div id="prof-panel-favorites" style="display:${state.profileTab === 'favorites' ? '' : 'none'};">
        ${state.user.favorites.length === 0
          ? `<div class="empty-revs"><i class="fa-regular fa-heart"></i><p>No favorites yet. Tap the heart on any restaurant to save it here.</p></div>`
          : state.user.favorites.map(fid => {
              const fr = RESTAURANTS.find(x => x.id === fid);
              if (!fr) return '';
              const dist = haversine(state.userLocation.lat, state.userLocation.lng, fr.lat, fr.lng);
              return `<div class="fav-card" onclick="openDetail(${fr.id})">
                <div class="fav-card-img" style="background:${fr.bg};">${fr.emoji}</div>
                <div class="fav-card-body">
                  <div class="fav-card-name">${fr.name}</div>
                  <div class="fav-card-meta">
                    <span class="fav-card-rating">★ ${fr.rating.toFixed(1)}</span>
                    <span class="fav-card-dist">${dist.toFixed(1)} mi</span>
                  </div>
                </div>
                <button class="fav-card-rm" onclick="event.stopPropagation();removeFavorite(${fr.id})" title="Remove"><i class="fa-solid fa-xmark"></i></button>
              </div>`;
            }).join('')
        }
      </div>
    </div>
  `;
}

function removeFavorite(id) {
  state.user.favorites = state.user.favorites.filter(f => f !== id);
  saveFavorites();
  if (state.filters.favoritesOnly) { renderMapMarkers(); if (state.locatorView === 'list') renderList(); }
  renderProfile();
  showToast('Removed from favorites', 'heart-crack');
}

// ── Nickname Modal ──
function openNickModal() {
  document.getElementById('nm-input').value = state.user.nickname;
  document.getElementById('nick-modal').classList.add('open');
  setTimeout(() => document.getElementById('nm-input').focus(), 200);
}

function closeNickModal() {
  document.getElementById('nick-modal').classList.remove('open');
}

async function saveNickname() {
  const val = document.getElementById('nm-input').value.trim();
  if (val.length < 2) { showToast('Nickname must be at least 2 characters','triangle-exclamation'); return; }
  state.user.nickname = val;
  closeNickModal();
  // Persist to Firestore if signed in
  if (currentUser) {
    try {
      await db.collection('users').doc(currentUser.uid).update({ nickname: val });
    } catch(e) { console.warn('Firestore write failed:', e); }
  }
  renderProfile();
  showToast('Nickname updated!', 'check');
}

// ═══════════════════════════════════════════
//  FIREBASE AUTH
// ═══════════════════════════════════════════

async function signInWithGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    // onAuthStateChanged fires next — it handles the rest
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showToast('Sign-in failed. Please try again.', 'triangle-exclamation');
      console.error('Google sign-in error:', e);
    }
  }
}

async function signOutUser() {
  try {
    await auth.signOut();
    // onAuthStateChanged fires next — shows login screen
  } catch(e) {
    showToast('Sign-out failed', 'triangle-exclamation');
  }
}

async function loadOrCreateProfile(user) {
  const ref = db.collection('users').doc(user.uid);
  const snap = await ref.get();

  if (snap.exists) {
    userProfile = snap.data();
    // Sync state from Firestore
    state.user.nickname  = userProfile.nickname  || user.displayName || 'FrankFan';
    state.user.photoUrl  = user.photoURL          || null;
    state.user.visitCount = userProfile.visitCount || 0;

    // Load this user's reviews from Firestore
    const rvSnap = await db.collection('reviews')
      .where('userId', '==', user.uid)
      .orderBy('createdAt', 'desc')
      .get();
    state.user.reviews = rvSnap.docs.map(d => d.data());
  } else {
    // New user — create their profile doc
    const defaultNick = (user.displayName || 'FrankFan').replace(/\s+/g, '');
    userProfile = {
      nickname:   defaultNick,
      photoUrl:   user.photoURL || null,
      visitCount: 0,
      createdAt:  firebase.firestore.FieldValue.serverTimestamp()
    };
    await ref.set(userProfile);
    state.user.nickname  = defaultNick;
    state.user.photoUrl  = user.photoURL || null;
    state.user.visitCount = 0;
    state.user.reviews   = [];
  }
}

function handleAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    state.user.photoUrl = evt.target.result;
    renderProfile();
    showToast('Profile photo updated!', 'check');
  };
  reader.readAsDataURL(file);
}

// ── Enter on nickname modal ──
document.getElementById('nm-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') saveNickname();
});

// ═══════════════════════════════════════════
//  GEOCODING — address → lat/lng via Nominatim
//  Results cached in localStorage so it only
//  runs once; every visit after that is instant.
// ═══════════════════════════════════════════

const GEO_CACHE_KEY = 'ff_geocache_v2';

function getGeoCache() {
  try { return JSON.parse(localStorage.getItem(GEO_CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveGeoCache(c) {
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(c)); }
  catch(e) {}
}

async function geocodeOne(address) {
  const q = encodeURIComponent(address + ', USA');
  const res = await fetch(
    `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,
    { headers: { 'User-Agent': 'FrankFinder/1.0 (NJ hot dog locator)' } }
  );
  const data = await res.json();
  if (data && data.length > 0)
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  return null;
}

async function geocodeRestaurants() {
  const cache = getGeoCache();

  // Apply cached coords immediately — accurate on all visits after the first
  RESTAURANTS.forEach(r => {
    if (cache[r.id]) { r.lat = cache[r.id].lat; r.lng = cache[r.id].lng; }
  });

  // Find which ones still need geocoding
  const missing = RESTAURANTS.filter(r => !cache[r.id]);
  if (missing.length === 0) return; // all done

  // Geocode in background, one per second (Nominatim rate limit)
  // Update map markers every 5 resolutions so pins snap in smoothly
  let batch = 0;
  for (const r of missing) {
    await new Promise(res => setTimeout(res, 1100));
    try {
      const coords = await geocodeOne(r.address);
      if (coords) {
        r.lat = coords.lat;
        r.lng = coords.lng;
        cache[r.id] = coords;
        saveGeoCache(cache);
        batch++;
        if (batch % 5 === 0 && state.mapInited && state.page === 'locator') {
          renderMapMarkers();
        }
      }
    } catch(e) { /* keep existing approximate coords */ }
  }
  // Final flush once all done
  if (state.mapInited && state.page === 'locator') renderMapMarkers();
}

// Kick off geocoding immediately (runs async in background)
geocodeRestaurants();

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  // Load saved favorites from localStorage
  loadFavorites();

  // Radius slider live update
  document.getElementById('radius-slider').addEventListener('input', function() {
    document.getElementById('radius-val').textContent = this.value + 'mi';
  });

  let splashDone = false;
  let authReady  = false;

  function maybeReveal() {
    if (!splashDone || !authReady) return;
    // Hide loading screen and show app — everyone gets in
    document.getElementById('loading-screen').classList.add('hide');
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
    document.getElementById('app').style.display = 'flex';
    initMap();
  }

  // Minimum splash duration (1.4 s)
  setTimeout(() => { splashDone = true; maybeReveal(); }, 1400);

  // Start app hidden during splash
  document.getElementById('app').style.display = 'none';

  // Process any pending redirect FIRST, then wire up the auth listener.
  function setupAuthListener() {
    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        try { await loadOrCreateProfile(user); } catch(e) { console.warn('Profile load error:', e); }
        closeSignInModal(); // dismiss sign-in prompt if open
        // Apply any favorite the user was trying to save before sign-in
        if (pendingFavoriteId !== null && !state.user.favorites.includes(pendingFavoriteId)) {
          state.user.favorites.push(pendingFavoriteId);
          saveFavorites();
          updateFavBtn();
          showToast('Added to favorites', 'heart');
        }
        pendingFavoriteId = null;
      } else {
        currentUser = null;
        userProfile = null;
        state.user = { nickname:'FrankFan', photoUrl:null, reviews:[], favorites:[], visitCount:0 };
        loadFavorites(); // restore from localStorage after sign-out
      }
      // Re-render profile page if it's currently visible
      if (state.page === 'profile') renderProfile();
      // Re-render open restaurant detail so the review form replaces the sign-in prompt
      if (state.selectedRestaurantId) openDetail(state.selectedRestaurantId);
      authReady = true;
      maybeReveal();
    });
  }

  // Wait for redirect result before listening to auth state
  auth.getRedirectResult()
    .catch(err => {
      if (err.code && !['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(err.code)) {
        showToast('Sign-in failed. Please try again.', 'triangle-exclamation');
      }
    })
    .finally(() => {
      setupAuthListener();
    });
});
</script>
